name: Build and publish Docker image

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: dqsq2e2/lsky-pro:${{ github.ref_name }}-${{ matrix.arch }}
          build-args: LSKY_IMAGE_VERSION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Test persistent volume initialization
        run: |
          data_dir="${RUNNER_TEMP}/lsky-data-${{ matrix.arch }}"
          mkdir -p "$data_dir"

          docker run --rm \
            --volume "$data_dir:/var/www/html" \
            "dqsq2e2/lsky-pro:${{ github.ref_name }}-${{ matrix.arch }}" \
            sh -ec '
              grep -qx "Listen 80" /etc/apache2/ports.conf
              php -l app/Services/WebDavClient.php >/dev/null
              php -l app/Services/WebDavFileCache.php >/dev/null
              php -l app/Services/CachedWebDavAdapter.php >/dev/null
              php docker/webdav-features-smoke.php
              test -f public/index.php
              cmp -s /var/www/lsky/.lsky-image-version .lsky-image-version
              test -f storage/.env
              grep -Eq "^APP_KEY=.+$" storage/.env
              test -L .env
              test -L installed.lock
              test -L public/i
              test -L public/storage
            '

          docker run --rm \
            --volume "$data_dir:/var/www/html" \
            "dqsq2e2/lsky-pro:${{ github.ref_name }}-${{ matrix.arch }}" \
            sh -ec '
              touch persisted.marker
              printf "previous-image\n" > .lsky-image-version
              rm app/Enums/StrategyKey.php
            '
          docker run --rm \
            --volume "$data_dir:/var/www/html" \
            "dqsq2e2/lsky-pro:${{ github.ref_name }}-${{ matrix.arch }}" \
            sh -ec '
              test -f persisted.marker
              test -f app/Enums/StrategyKey.php
              cmp -s /var/www/lsky/.lsky-image-version .lsky-image-version
            '

          container_id=$(docker run --detach \
            --env WEB_PORT=8089 \
            --publish 127.0.0.1::8089 \
            --volume "$data_dir:/var/www/html" \
            "dqsq2e2/lsky-pro:${{ github.ref_name }}-${{ matrix.arch }}")
          trap 'docker rm --force "$container_id" >/dev/null 2>&1 || true' EXIT

          host_port=$(docker port "$container_id" 8089/tcp | awk -F: 'NR == 1 { print $NF }')
          ready=0
          for attempt in $(seq 1 15); do
            if curl --silent --show-error \
              --output /dev/null \
              --connect-timeout 2 \
              --max-time 5 \
              "http://127.0.0.1:${host_port}/"; then
              ready=1
              break
            fi
            sleep 2
          done

          if [ "$ready" -ne 1 ]; then
            docker logs "$container_id"
            exit 1
          fi

          docker rm --force "$container_id"
          trap - EXIT

  publish:
    name: Publish multi-architecture image
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag dqsq2e2/lsky-pro:latest \
            --tag dqsq2e2/lsky-pro:${{ github.ref_name }} \
            dqsq2e2/lsky-pro:${{ github.ref_name }}-amd64 \
            dqsq2e2/lsky-pro:${{ github.ref_name }}-arm64

      - name: Inspect published image
        run: docker buildx imagetools inspect dqsq2e2/lsky-pro:${{ github.ref_name }}
