name: Build and publish Docker image

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: dqsq2e2/lsky-pro:${{ github.ref_name }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Test persistent volume initialization
        run: |
          data_dir="${RUNNER_TEMP}/lsky-data-${{ matrix.arch }}"
          mkdir -p "$data_dir"

          docker run --rm \
            --volume "$data_dir:/var/www/html" \
            "dqsq2e2/lsky-pro:${{ github.ref_name }}-${{ matrix.arch }}" \
            sh -ec '
              test -f public/index.php
              test -f storage/.env
              grep -Eq "^APP_KEY=.+$" storage/.env
              test -L .env
              test -L installed.lock
              test -L public/i
              test -L public/storage
            '

          touch "$data_dir/persisted.marker"
          docker run --rm \
            --volume "$data_dir:/var/www/html" \
            "dqsq2e2/lsky-pro:${{ github.ref_name }}-${{ matrix.arch }}" \
            test -f persisted.marker

  publish:
    name: Publish multi-architecture image
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag dqsq2e2/lsky-pro:latest \
            --tag dqsq2e2/lsky-pro:${{ github.ref_name }} \
            dqsq2e2/lsky-pro:${{ github.ref_name }}-amd64 \
            dqsq2e2/lsky-pro:${{ github.ref_name }}-arm64

      - name: Inspect published image
        run: docker buildx imagetools inspect dqsq2e2/lsky-pro:${{ github.ref_name }}
